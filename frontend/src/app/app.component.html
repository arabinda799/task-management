<router-outlet></router-outlet>

<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1200;">
  @for (toast of toastService.toasts(); track toast) {
  <div class="toast show align-items-center text-white border-0 mb-2" [class.bg-success]="toast.type === 'success'"
    [class.bg-danger]="toast.type === 'danger'" role="alert">
    <div class="d-flex">
      <div class="toast-body">
        {{ toast.message }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastService.remove(toast)"></button>
    </div>
  </div>
  }
</div>
